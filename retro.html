/* =====================
   SHUFFLE ENGINE
===================== */


function shuffle(array){

    for(
    var i = array.length - 1;
    i > 0;
    i--
    ){

        var j =
        Math.floor(
            Math.random() *
            (i + 1)
        );


        var temp =
        array[i];


        array[i] =
        array[j];


        array[j] =
        temp;

    }

}




/* =====================
   RETRO GENERATOR
===================== */


function generateRetro(){


    var pool =
    wordPool.slice();


    shuffle(pool);



    var output = "";



    var paragraphs =
    Math.floor(
        Math.random()*3
    ) + 3;



    for(
    var p = 0;
    p < paragraphs;
    p++
    ){


        var sentence = "";



        var length =
        Math.floor(
            Math.random()*6
        ) + 5;



        for(
        var i = 0;
        i < length;
        i++
        ){


            sentence +=
            pool.pop();


        }



        output +=

        "<p>" +
        sentence.trim() +
        "</p>";



    }



    document.getElementById(
        "para2"
    ).innerHTML =
    output;


}

/* =====================
   REVERSE MODE
===================== */


function reversePoem(){


    var box =
    document.getElementById(
        "para2"
    );



    var paragraphs =
    Array.from(
        box.querySelectorAll("p")
    );



    paragraphs.reverse();



    box.innerHTML = "";



    paragraphs.forEach(
        function(item){

            box.appendChild(item);

        }
    );


}
